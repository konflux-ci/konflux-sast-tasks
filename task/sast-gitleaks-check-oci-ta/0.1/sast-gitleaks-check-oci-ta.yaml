---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: sast-gitleaks-check-oci-ta
  annotations:
    tekton.dev/pipelines.minVersion: 0.12.1
    tekton.dev/tags: konflux
  labels:
    app.kubernetes.io/version: "0.1"
spec:
  description: |-
    Scans source code for exposed secrets, ensuring keys, passwords, and tokens aren't leaked in repositories.

    See https://github.com/gitleaks/gitleaks for more information on how to use Gitleaks.
  params:
    - name: CACHI2_ARTIFACT
      description: The Trusted Artifact URI pointing to the artifact with
        the prefetched dependencies.
      type: string
      default: ""
    - name: GITLEAKS_ARGS
      description: Additional CLI arguments to pass to gitleaks
      type: string
      default: ""
    - name: KFP_GIT_URL
      description: Known False Positives (KFP) git URL (optionally taking
        a revision delimited by \#). Defaults to "SITE_DEFAULT", which means
        the default value "https://gitlab.cee.redhat.com/osh/known-false-positives.git"
        for internal Konflux instance and empty string for external Konflux
        instance. If set to an empty string, the KFP filtering is disabled.
      type: string
      default: SITE_DEFAULT
    - name: PROJECT_NAME
      description: Name of the scanned project, used to find path exclusions.
        By default, the Konflux component name will be used.
      type: string
      default: ""
    - name: RECORD_EXCLUDED
      description: Write excluded records in file. Useful for auditing (defaults
        to false).
      type: string
      default: "false"
    - name: SOURCE_ARTIFACT
      description: The Trusted Artifact URI pointing to the artifact with
        the application source code.
      type: string
    - name: TARGET_DIRS
      description: Target directories in component's source code. Multiple
        values should be separated with commas.
      type: string
      default: .
    - name: caTrustConfigMapKey
      description: The name of the key in the ConfigMap that contains the
        CA bundle data.
      type: string
      default: ca-bundle.crt
    - name: caTrustConfigMapName
      description: The name of the ConfigMap to read CA bundle data from.
      type: string
      default: trusted-ca
    - name: image-digest
      description: Digest of the image to scan.
      type: string
    - name: image-url
      description: Image URL.
      type: string
  results:
    - name: TEST_OUTPUT
      description: Tekton task test output.
  volumes:
    - name: trusted-ca
      configMap:
        items:
          - key: $(params.caTrustConfigMapKey)
            path: ca-bundle.crt
        name: $(params.caTrustConfigMapName)
        optional: true
    - name: workdir
      emptyDir: {}
  stepTemplate:
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
  steps:
    - name: use-trusted-artifact
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:254989d35310c0998eb2ae60aa4703da842d99d82ed434fd5208cc9639d32969
      args:
        - use
        - $(params.SOURCE_ARTIFACT)=/var/workdir/source
        - $(params.CACHI2_ARTIFACT)=/var/workdir/cachi2
      volumeMounts:
        - mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
          name: trusted-ca
          readOnly: true
          subPath: ca-bundle.crt
      computeResources:
        limits:
          memory: 4Gi
        requests:
          memory: 4Gi
    - name: gitleaks-check
      image: quay.io/konflux-ci/konflux-test:v1.5.4@sha256:dae74bf0d6fc349d3ae140d9e3a921ad5009fdf8dade3186bfd9b65fbe3a365b
      workingDir: /var/workdir
      volumeMounts:
        - mountPath: /mnt/trusted-ca
          name: trusted-ca
          readOnly: true
      env:
        - name: KFP_GIT_URL
          value: $(params.KFP_GIT_URL)
        - name: PROJECT_NAME
          value: $(params.PROJECT_NAME)
        - name: RECORD_EXCLUDED
          value: $(params.RECORD_EXCLUDED)
        - name: TARGET_DIRS
          value: $(params.TARGET_DIRS)
        - name: GITLEAKS_ARGS
          value: $(params.GITLEAKS_ARGS)
        - name: COMPONENT_LABEL
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['appstudio.openshift.io/component']
      script: |
        #!/usr/bin/env bash

        set -euo pipefail
        # shellcheck source=/dev/null
        . /utils.sh
        trap 'handle_error $(results.TEST_OUTPUT.path)' EXIT

        if [[ -z "${PROJECT_NAME}" ]]; then
          PROJECT_NAME=${COMPONENT_LABEL}
        fi

        echo "INFO: The PROJECT_NAME used is: ${PROJECT_NAME}"

        # Installation of Red Hat certificates for cloning Red Hat internal repositories
        ca_bundle=/mnt/trusted-ca/ca-bundle.crt
        if [ -f "$ca_bundle" ]; then
          echo "INFO: Using mounted CA bundle: $ca_bundle"
          cp -vf $ca_bundle /etc/pki/ca-trust/source/anchors
          update-ca-trust
        fi

        SOURCE_CODE_DIR=/var/workdir/source

        set +e
        echo "INFO: Running 'gitleaks dir'.."
        # We do want to expand ARGS (it can be multiple CLI flags, not just one)
        # shellcheck disable=SC2086

        cd ${SOURCE_CODE_DIR}
        gitleaks dir "$TARGET_DIRS" --verbose --report-format sarif --exit-code=3 --report-path "sast_gitleaks_check_out.json" "$GITLEAKS_ARGS" 1>&2 >>stdout.txt
        GITLEAKS_EXIT_CODE=$?

        set -e
        test_not_skipped=0
        SKIP_MSG="We found 0 supported files"
        grep -q "$SKIP_MSG" stdout.txt || test_not_skipped=$?

        if [[ "$GITLEAKS_EXIT_CODE" -eq 0 ]] || [[ "$GITLEAKS_EXIT_CODE" -eq 3 ]]; then
          # Check if the merged SARIF file has content - this could happen if gitleaks found no findings
          if [ ! -s "${SOURCE_CODE_DIR}/sast_gitleaks_check_out.json" ]; then
            echo "WARN: No JSON output files were generated by gitleaks scan"
            # Get gitleaks version for proper SARIF metadata
            GITLEAKS_VERSION=$(gitleaks --version 2>/dev/null | head -1 | tr -d '\n' || echo "unknown")
            # Create a valid minimal SARIF structure using jq
            # Note: coverage array is required even when empty because downstream jq commands expect it
            jq -n --arg version "$GITLEAKS_VERSION" '{
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": [{
                "tool": {
                  "driver": {
                    "name": "gitleaks",
                    "version": $version,
                    "informationUri": "https://github.com/gitleaks/gitleaks"
                  }
                },
                "results": [],
                "properties": {
                  "coverage": []
                }
              }]
            }' >"${SOURCE_CODE_DIR}/sast_gitleaks_check_out.json"
          fi

          # Get context of leak
          csgrep --mode=json --embed-context=3 "${SOURCE_CODE_DIR}"/sast_gitleaks_check_out.json >sast_gitleaks_check_out_all_findings.json

          echo "INFO: Initial results:"
          csgrep --mode=grep sast_gitleaks_check_out_all_findings.json

          if [[ "${KFP_GIT_URL}" == "SITE_DEFAULT" ]]; then
            KFP_GIT_URL="https://gitlab.cee.redhat.com/osh/known-false-positives.git"
          fi
          PROBE_URL="${KFP_GIT_URL%.git}" # trims '.git' suffix

          # create the KFP clone directory regardless
          KFP_DIR="known-false-positives"
          KFP_CLONED="0"
          mkdir "${KFP_DIR}"

          # We check if the KFP_GIT_URL variable is set to clone and apply the filters or not
          if [[ -n "${KFP_GIT_URL}" ]]; then
            # Default location only reachable from internal Konflux instances, check reachable first
            echo -n "INFO: Probing ${PROBE_URL}... "
            if curl --fail --head --max-time 60 --no-progress-meter "${PROBE_URL}" > >(head -1); then
              echo "INFO: Trying to clone known-false-positives.."
              git clone "${KFP_GIT_URL}" "${KFP_DIR}" && KFP_CLONED="1"
            fi
          fi

          if [[ "${KFP_CLONED}" -eq "0" ]]; then
            echo "WARN: Failed to clone know-false-positives at ${KFP_GIT_URL}, scan results will not be filtered"
            mv sast_gitleaks_check_out_all_findings.json filtered_sast_gitleaks_check_out.json
          else
            echo "INFO: Filtering false positives in results files using csfilter-kfp..."

            CMD=(
              csfilter-kfp
              --verbose
              --kfp-dir="${KFP_DIR}"
              --project-nvr="${PROJECT_NAME}"
            )

            if [ "${RECORD_EXCLUDED}" == "true" ]; then
              CMD+=(--record-excluded="excluded-findings.json")
            fi

            set +e
            "${CMD[@]}" sast_gitleaks_check_out_all_findings.json >filtered_sast_gitleaks_check_out.json
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              echo "WARN: failed to filter known false positives" >&2
            else
              echo "INFO: Succeeded filtering known false positives" >&2
            fi
            echo "INFO: Results after filtering:"
            (set -x && csgrep --mode=evtstat filtered_sast_gitleaks_check_out.json)
          fi

          csgrep --mode=sarif filtered_sast_gitleaks_check_out.json >sast_gitleaks_check_out.sarif

          TEST_OUTPUT=
          parse_test_output "$(context.task.name)" sarif "sast_gitleaks_check_out.sarif" || true

        # When the test is skipped, the "GITLEAKS_EXIT_CODE" is 3 and it can also be 3 in some other situation
        elif [[ "$test_not_skipped" -eq 0 ]]; then
          note="Task $(context.task.name) success: Gitleaks scan found zero supported files."
          ERROR_OUTPUT=$(make_result_json -r SUCCESS -t "$note")
        else
          echo "sast-gitleaks-check test failed because of the following issues:"
          cat stdout.txt
          note="Task $(context.task.name) failed: For details, check Tekton task log."
          ERROR_OUTPUT=$(make_result_json -r ERROR -t "$note")
        fi
        echo "${TEST_OUTPUT:-${ERROR_OUTPUT}}" | tee "$(results.TEST_OUTPUT.path)"
      computeResources:
        limits:
          memory: 6Gi
        requests:
          cpu: "1"
          memory: 6Gi
    - name: upload
      image: quay.io/konflux-ci/oras:latest@sha256:561847430299db122ba499a3c1a4e28d850c191c9da6048a23361963eda49cac
      workingDir: /var/workdir
      volumeMounts:
        - mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
          name: trusted-ca
          readOnly: true
          subPath: ca-bundle.crt
      env:
        - name: IMAGE_URL
          value: $(params.image-url)
        - name: IMAGE_DIGEST
          value: $(params.image-digest)
      script: |
        #!/usr/bin/env bash

        export REPORT_DIR="./"
        export REPORT_FILE="sast-gitleaks-results.json"
        export REPORT_PATH="${REPORT_DIR}${REPORT_FILE}"
        export FILTERED_REPORT_PATH="${REPORT_DIR}filtered_${REPORT_FILE}"

        if [ -z "${IMAGE_URL}" ]; then
          echo 'No image-url provided. Skipping upload.'
          exit 0
        fi

        UPLOAD_FILES="sast_gitleaks_check_out.sarif excluded-findings.json"
        for UPLOAD_FILE in ${UPLOAD_FILES}; do
          if [ ! -f "${UPLOAD_FILE}" ]; then
            echo "No ${UPLOAD_FILE} exists. Skipping upload."
            continue
          fi
          if [ "${UPLOAD_FILES}" == "excluded-findings.json" ]; then
            MEDIA_TYPE=application/json
          else
            MEDIA_TYPE=application/sarif+json
          fi
          echo "Selecting auth"
          select-oci-auth "${IMAGE_URL}" >"${HOME}/auth.json"
          echo "Attaching to ${IMAGE_URL}"
          if ! retry oras attach --no-tty --registry-config "$HOME/auth.json" --artifact-type "${MEDIA_TYPE}" "${IMAGE_URL}@${IMAGE_DIGEST}" "${UPLOAD_FILE}:${MEDIA_TYPE}"; then
            echo "Failed to attach to ${IMAGE_URL}"
          fi
        done
      computeResources:
        limits:
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 256Mi
