---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-sast-snyk-check-no-token
spec:
  description: |
    Test the sast-snyk-check task is skipped when no token is available
  workspaces:
    - name: tests-workspace
  tasks:
    - name: scan-with-snyk
      workspaces:
        - name: workspace
          workspace: tests-workspace
      taskRef:
        name: sast-snyk-check
      params:
        - name: SNYK_SECRET
          value: missing-token
        - name: image-url
          # TODO add credentials for `oci-attach` so that upload can be tested
          # for now, set this to empty string to force skipping of upload results step
          value: ""
        - name: image-digest
          value: sha256:a6e305864fefbce727a3d8cc9f0277eede5f0617696f9cda486b1f6b3b94f7cb
    - name: check-result
      runAfter:
        - scan-with-snyk
      workspaces:
        - name: workspace
          workspace: tests-workspace
      params:
        - name: results
          value: $(tasks.scan-with-snyk.results.TEST_OUTPUT)
      taskSpec:
        params:
          - name: results
        steps:
          - name: check-result
            image: quay.io/konflux-ci/konflux-test:v1.4.51@sha256:169f73f80fbde8d54f42416c5de8cc9214ecc7e8c89c70a3385285bbac32ad0a
            env:
            - name: RESULTS
              value: $(params.results)
            script: |
              #!/bin/bash

              set -e

              echo "$RESULTS"
              # snyk check should skip because snyk_token is unavailable in ephemeral clusters
              echo -n "Expected result: "
              echo "$RESULTS" | jq -e '.result == "SKIPPED" and (.note | contains("snyk_token")) and .successes == 0 and .failures == 0 and .warnings == 0'
