---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-sast-snyk-check
spec:
  description: |
    Test the sast-snyk-check task runs successfully with TARGET_DIRS (multiple values),
    exercising SARIF merging, and verify the expected merged SARIF is produced.
  workspaces:
    - name: tests-workspace
  tasks:
    - name: init
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/init/0.2/init.yaml
      params:
        - name: image-url
          value: "quay.io/redhat-user-workloads/sast-tests-tenant/tests/tests-sast-shell-check:latest"
    - name: clone-repository
      runAfter:
        - init
      workspaces:
        - name: output
          workspace: tests-workspace
      params:
        - name: url
          value: https://github.com/konflux-ci/test-data-sast
        - name: revision
          value: main
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/git-clone/0.1/git-clone.yaml
    - name: scan-with-snyk
      runAfter:
        - clone-repository
      workspaces:
        - name: workspace
          workspace: tests-workspace
      taskRef:
        name: sast-snyk-check
      params:
        - name: image-url
          # TODO add credentials for `oci-attach` so that upload can be tested
          # for now, set this to empty string to force skipping of upload results step
          value: ""
        - name: image-digest
          value: sha256:a6e305864fefbce727a3d8cc9f0277eede5f0617696f9cda486b1f6b3b94f7cb
        # Use multiple TARGET_DIRS to exercise SARIF merging (task produces per-dir SARIFs then merges)
        - name: TARGET_DIRS
          value: "gcc,test-project"
    - name: check-result
      runAfter:
        - scan-with-snyk
      workspaces:
        - name: workspace
          workspace: tests-workspace
      params:
        - name: results
          value: $(tasks.scan-with-snyk.results.TEST_OUTPUT)
      taskSpec:
        params:
          - name: results
        steps:
          - name: check-result
            image: quay.io/konflux-ci/konflux-test:v1.4.51@sha256:169f73f80fbde8d54f42416c5de8cc9214ecc7e8c89c70a3385285bbac32ad0a
            workingDir: $(workspaces.workspace.path)
            env:
            - name: RESULTS
              value: $(params.results)
            script: |
              #!/bin/bash

              set -e

              # RESULTS is set by Tekton from params.results
              results_json="${RESULTS}"
              echo "$results_json"
              # snyk check should skip because snyk_token is unavailable in ephemeral clusters
              result_type=$(echo "$results_json" | jq -r '.result')
              if [ "$result_type" = "SKIPPED" ] && echo "$results_json" | jq -e '(.note | contains("snyk_token"))' >/dev/null 2>&1; then
                # No TEST_SNYK_TOKEN in CI: task correctly skipped
                echo "Task skipped (no snyk token); OK"
              elif [ "$result_type" = "SUCCESS" ]; then
                echo -n "Expected result: "
                echo "$results_json" | jq -e '.successes == 0 and .failures == 0 and .warnings == 0'
                # Verify the expected (merged) SARIF was produced (task uses TARGET_DIRS with multiple values, merges per-dir SARIFs)
                report=$(find . -name 'sast_snyk_check_out.sarif')
                test -f "$report" || { echo "Expected SARIF not found: sast_snyk_check_out.sarif"; exit 1; }
                # this key will be present in original sarif files that was generated by snyk (vs generated by csdiff)
                # for now we use this as a proxy to verify snyk ran and produced json
                # TODO introduce Imp level finding in test repo, so we can check that the findings is detected
                jq -e 'select(.inlineExternalProperties[0].externalizedProperties["analyzer-version-snyk-code"] != null)' "$report"
              else
                echo "Unexpected result: $result_type"
                exit 1
              fi
