---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-sast-snyk-check
spec:
  description: |
    Test the sast-snyk-check task is runs successfully
  workspaces:
    - name: tests-workspace
  tasks:
    - name: init
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/init/0.2/init.yaml
      params:
        - name: image-url
          value: "quay.io/redhat-user-workloads/sast-tests-tenant/tests/tests-sast-shell-check:latest"
    - name: clone-repository
      runAfter:
        - init
      workspaces:
        - name: output
          workspace: tests-workspace
      params:
        - name: url
          value: https://github.com/konflux-ci/test-data-sast
        - name: revision
          value: main
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/git-clone/0.1/git-clone.yaml
    # Test 1: default TARGET_DIRS (unset — uses task default ".")
    - name: scan-with-snyk
      runAfter:
        - clone-repository
      workspaces:
        - name: workspace
          workspace: tests-workspace
      taskRef:
        name: sast-snyk-check
      params:
        - name: image-url
          # TODO add credentials for `oci-attach` so that upload can be tested
          # for now, set this to empty string to force skipping of upload results step
          value: ""
        - name: image-digest
          value: sha256:a6e305864fefbce727a3d8cc9f0277eede5f0617696f9cda486b1f6b3b94f7cb
    - name: check-result
      runAfter:
        - scan-with-snyk
      workspaces:
        - name: workspace
          workspace: tests-workspace
      params:
        - name: results
          value: $(tasks.scan-with-snyk.results.TEST_OUTPUT)
      taskSpec:
        params:
          - name: results
        steps:
          - name: check-result
            image: quay.io/konflux-ci/konflux-test:v1.4.52@sha256:deabe80a01dca3a8a0edb709324e30cbf0baa176f7a181bbb695323f506f7aac
            workingDir: $(workspaces.workspace.path)
            env:
            - name: RESULTS
              value: $(params.results)
            script: |
              #!/bin/bash

              set -e

              echo "$RESULTS"
              # With default TARGET_DIRS=. and --max-depth=1, snyk cannot reach code
              # files nested under source/ so it reports "zero supported files" (SUCCESS).
              echo -n "Expected result: "
              echo "$RESULTS" | jq -e '.result == "SUCCESS" and .successes == 0 and .failures == 0 and .warnings == 0'
    # Test 2: scan with multiple TARGET_DIRS to exercise SARIF merging
    - name: scan-with-snyk-target-dirs
      runAfter:
        - check-result
      workspaces:
        - name: workspace
          workspace: tests-workspace
      taskRef:
        name: sast-snyk-check
      params:
        - name: image-url
          value: ""
        - name: image-digest
          value: sha256:a6e305864fefbce727a3d8cc9f0277eede5f0617696f9cda486b1f6b3b94f7cb
        # Three non-overlapping dirs: first and last are clean; middle is test-project
        # where konflux-ci/test-data-sast#2 adds the high-severity finding. Ensures
        # merged SARIF reflects the middle scan, not only first or last file wins.
        - name: TARGET_DIRS
          value: "source/gcc,source/test-project,source/python-samples"
    - name: check-result-target-dirs
      runAfter:
        - scan-with-snyk-target-dirs
      workspaces:
        - name: workspace
          workspace: tests-workspace
      params:
        - name: results
          value: $(tasks.scan-with-snyk-target-dirs.results.TEST_OUTPUT)
      taskSpec:
        params:
          - name: results
        steps:
          - name: check-result
            image: quay.io/konflux-ci/konflux-test:v1.4.52@sha256:deabe80a01dca3a8a0edb709324e30cbf0baa176f7a181bbb695323f506f7aac
            workingDir: $(workspaces.workspace.path)
            env:
            - name: RESULTS
              value: $(params.results)
            script: |
              #!/bin/bash

              set -e

              echo "$RESULTS"
              echo -n "Expected result: "
              # Multi-target merge: only source/test-project carries the high finding
              # (konflux-ci/test-data-sast#2); gcc dirs are clean.
              echo "$RESULTS" | jq -e '.result == "FAILURE" and .successes == 0 and .failures == 1 and .warnings == 0'

              report=$(find . -name 'sast_snyk_check_out.sarif')
              test -f "$report" || { echo "Expected SARIF not found: sast_snyk_check_out.sarif"; exit 1; }
              # Proxy that Snyk produced SARIF (see konflux-ci/test-data-sast#2 for intentional high finding)
              jq -e 'select(.inlineExternalProperties[0].externalizedProperties["analyzer-version-snyk-code"] != null)' "$report"
