---
base: ../../sast-snyk-check/0.4/sast-snyk-check.yaml
add:
  - use-source
  - use-prefetch
preferStepTemplate: true
removeWorkspaces:
  - workspace
replacements:
  workspaces.workspace.path: /var/workdir
regexReplacements:
  hacbs/\$\(context.task.name\): source
useTAVolumeMount: true
addParams:
  - name: SCAN_INPUT_MODE
    type: string
    description: When set to image-ref-scripts, fetch script-like files from image-url@image-digest (OCI artifact manifest) into /var/workdir/source before the main scan step. Requires use-source. Default source-artifact uses only restored SOURCE_ARTIFACT.
    default: source-artifact
  - name: SCRIPT_PATH_REGEX
    type: string
    description: Extended regex matching org.opencontainers.image.title paths in the OCI manifest when SCAN_INPUT_MODE=image-ref-scripts.
    default: (^|/)(Dockerfile|Containerfile|[^/]+\.(sh|bash|zsh|ksh|py|rb|pl|js|mjs|cjs|ts|ps1))$
additionalSteps:
  - at: 2
    name: cleanup-scan-input-from-image
    image: quay.io/konflux-ci/oras:latest@sha256:da693a7dcbadafc9f4422ae6600b41b2847944f7f14c5622827d6f58c727cf08
    workingDir: /var/workdir
    volumeMounts:
      - mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
        name: trusted-ca
        readOnly: true
        subPath: ca-bundle.crt
    env:
      - name: SCAN_INPUT_MODE
        value: $(params.SCAN_INPUT_MODE)
    script: |
      #!/usr/bin/env bash
      set -euo pipefail
      if [[ "${SCAN_INPUT_MODE}" != "image-ref-scripts" ]]; then
        exit 0
      fi
      if [[ ! -f /var/workdir/fetched-script-files.txt ]]; then
        exit 0
      fi
      while IFS= read -r f; do
        [[ -n "${f}" ]] || continue
        if [[ -f "${f}" ]]; then
          rm -f "${f}"
        fi
      done </var/workdir/fetched-script-files.txt
      rm -f /var/workdir/fetched-script-files.txt
    computeResources:
      limits:
        memory: 256Mi
      requests:
        cpu: 50m
        memory: 128Mi
  - at: 1
    name: prepare-scan-input-from-image
    image: quay.io/konflux-ci/oras:latest@sha256:da693a7dcbadafc9f4422ae6600b41b2847944f7f14c5622827d6f58c727cf08
    workingDir: /var/workdir
    volumeMounts:
      - mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
        name: trusted-ca
        readOnly: true
        subPath: ca-bundle.crt
    env:
      - name: SCAN_INPUT_MODE
        value: $(params.SCAN_INPUT_MODE)
      - name: SCRIPT_PATH_REGEX
        value: $(params.SCRIPT_PATH_REGEX)
      - name: IMAGE_URL
        value: $(params.image-url)
      - name: IMAGE_DIGEST
        value: $(params.image-digest)
    script: |
      #!/usr/bin/env bash
      set -euo pipefail

      if [[ "${SCAN_INPUT_MODE}" != "image-ref-scripts" ]]; then
        echo "INFO: SCAN_INPUT_MODE=${SCAN_INPUT_MODE}, using SOURCE_ARTIFACT input"
        exit 0
      fi

      if [[ -z "${IMAGE_URL}" || -z "${IMAGE_DIGEST}" ]]; then
        echo "INFO: image-url/image-digest missing, cannot fetch scan input from image reference"
        exit 0
      fi

      IMAGE_REF="${IMAGE_URL}@${IMAGE_DIGEST}"
      echo "INFO: Preparing scan input from OCI reference ${IMAGE_REF}"

      select-oci-auth "${IMAGE_URL}" >"${HOME}/auth.json"
      oras manifest fetch --registry-config "${HOME}/auth.json" "${IMAGE_REF}" >"/tmp/manifest.json"

      config_media_type="$(jq -r '.config.mediaType // ""' /tmp/manifest.json)"
      if [[ "${config_media_type}" == "application/vnd.oci.image.config.v1+json" ]] || [[ "${config_media_type}" == "application/vnd.docker.container.image.v1+json" ]]; then
        echo "INFO: Reference points to a container image config (${config_media_type}); keeping SOURCE_ARTIFACT input"
        exit 0
      fi

      rm -rf /var/workdir/source
      mkdir -p /var/workdir/source
      fetched_files_manifest="/var/workdir/fetched-script-files.txt"
      : >"${fetched_files_manifest}"

      fetched_count=0
      while IFS=$'\t' read -r digest rel_path; do
        [[ -n "${rel_path}" ]] || continue
        if ! printf '%s\n' "${rel_path}" | grep -Eq "${SCRIPT_PATH_REGEX}"; then
          continue
        fi

        dest_path="/var/workdir/source/${rel_path}"
        resolved_dest="$(realpath -m "${dest_path}")"
        if [[ ! "${resolved_dest}" == /var/workdir/source/* ]]; then
          echo "WARN: Skipping path outside source root: ${rel_path}"
          continue
        fi

        mkdir -p "$(dirname "${resolved_dest}")"
        echo "INFO: Fetching script blob ${digest} -> ${rel_path}"
        oras blob fetch --registry-config "${HOME}/auth.json" "${IMAGE_URL}@${digest}" --output "${resolved_dest}"
        echo "${resolved_dest}" >>"${fetched_files_manifest}"
        fetched_count=$((fetched_count + 1))
      done < <(jq -r '.layers[] | [.digest, (.annotations["org.opencontainers.image.title"] // "")] | @tsv' /tmp/manifest.json)

      if [[ "${fetched_count}" -eq 0 ]]; then
        echo "INFO: No script-like files matched SCRIPT_PATH_REGEX; source directory will remain empty"
      else
        echo "INFO: Prepared ${fetched_count} script-like files from OCI artifact manifest"
      fi
    computeResources:
      limits:
        memory: 2Gi
      requests:
        cpu: 100m
        memory: 512Mi
