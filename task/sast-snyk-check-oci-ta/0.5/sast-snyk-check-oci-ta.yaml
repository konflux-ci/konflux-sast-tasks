---
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: sast-snyk-check-oci-ta
  annotations:
    tekton.dev/pipelines.minVersion: 0.12.1
    tekton.dev/tags: konflux
  labels:
    app.kubernetes.io/version: "0.5"
spec:
  description: |-
    Scans source code for security vulnerabilities, including common issues such as SQL injection, cross-site scripting (XSS), and code injection attacks using Snyk Code, a Static Application Security Testing (SAST) tool.

    Follow the steps given [here](https://konflux-ci.dev/docs/testing/build/snyk/) to obtain a snyk-token and to enable the snyk task in a Pipeline.

    The snyk binary used in this Task comes from a container image defined in https://github.com/konflux-ci/konflux-test

    See https://snyk.io/product/snyk-code/ and https://snyk.io/ for more information about the snyk tool.
  params:
    - name: ARGS
      description: Append arguments.
      type: string
      default: ""
    - name: CACHI2_ARTIFACT
      description: The Trusted Artifact URI pointing to the artifact with
        the prefetched dependencies.
      type: string
      default: ""
    - name: EXTRA_ARTIFACT_FILTER
      description: Extended regex matching org.opencontainers.image.title
        paths in the OCI manifest when FETCH_EXTRA_ARTIFACTS=true.
      type: string
      default: (^|/)(Dockerfile|Containerfile|[^/]+\.(sh|bash|zsh|ksh|py|rb|pl|js|mjs|cjs|ts|ps1))$
    - name: FETCH_EXTRA_ARTIFACTS
      description: When "true", fetch script-like files from image-url@image-digest
        (OCI artifact manifest) into /var/workdir/source alongside the restored
        SOURCE_ARTIFACT. Skipped for standard container images.
      type: string
      default: "false"
    - name: IGNORE_FILE_PATHS
      description: Directories or files to be excluded from Snyk scan (Comma-separated).
        Useful to split the directories of a git repo across multiple components.
      type: string
      default: ""
    - name: IMP_FINDINGS_ONLY
      description: Report only important findings in task result. Default
        is "true". To report all findings in task result, specify "false".
        Uploaded SARIF report to remote registry always includes all findings,
        regardless of severity level.
      type: string
      default: "true"
    - name: KFP_GIT_URL
      description: Known False Positives (KFP) git URL (optionally taking
        a revision delimited by \#). Defaults to "SITE_DEFAULT", which means
        the default value "https://gitlab.cee.redhat.com/osh/known-false-positives.git"
        for internal Konflux instance and empty string for external Konflux
        instance. If set to an empty string, the KFP filtering is disabled.
      type: string
      default: SITE_DEFAULT
    - name: PROJECT_NAME
      description: Name of the scanned project, used to find path exclusions.
        By default, the Konflux component name will be used.
      type: string
      default: ""
    - name: RECORD_EXCLUDED
      description: Write excluded records in file. Useful for auditing (defaults
        to false).
      type: string
      default: "false"
    - name: SNYK_SECRET
      description: Name of secret which contains Snyk token.
      default: snyk-secret
    - name: SOURCE_ARTIFACT
      description: The Trusted Artifact URI pointing to the artifact with
        the application source code.
      type: string
    - name: TARGET_DIRS
      description: Target directories in component's source code. Multiple
        values should be separated with commas.
      type: string
      default: .
    - name: caTrustConfigMapKey
      description: The name of the key in the ConfigMap that contains the
        CA bundle data.
      type: string
      default: ca-bundle.crt
    - name: caTrustConfigMapName
      description: The name of the ConfigMap to read CA bundle data from.
      type: string
      default: trusted-ca
    - name: image-digest
      description: Digest of the image to scan.
      type: string
    - name: image-url
      description: Image URL.
      type: string
  results:
    - name: TEST_OUTPUT
      description: Tekton task test output.
  volumes:
    - name: snyk-secret
      secret:
        optional: true
        secretName: $(params.SNYK_SECRET)
    - name: trusted-ca
      configMap:
        items:
          - key: $(params.caTrustConfigMapKey)
            path: ca-bundle.crt
        name: $(params.caTrustConfigMapName)
        optional: true
    - name: workdir
      emptyDir: {}
  stepTemplate:
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
  steps:
    - name: use-trusted-artifact
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:83e9875f45cefd335641973a74db8bb4987cc98e47024aa4822eafd4150c315d
      args:
        - use
        - $(params.SOURCE_ARTIFACT)=/var/workdir/source
        - $(params.CACHI2_ARTIFACT)=/var/workdir/cachi2
      volumeMounts:
        - mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
          name: trusted-ca
          readOnly: true
          subPath: ca-bundle.crt
      computeResources:
        limits:
          memory: 4Gi
        requests:
          memory: 4Gi
    - name: fetch-extra-artifacts
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:83e9875f45cefd335641973a74db8bb4987cc98e47024aa4822eafd4150c315d
      workingDir: /var/workdir
      volumeMounts:
        - mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
          name: trusted-ca
          readOnly: true
          subPath: ca-bundle.crt
      env:
        - name: FETCH_EXTRA_ARTIFACTS
          value: $(params.FETCH_EXTRA_ARTIFACTS)
        - name: EXTRA_ARTIFACT_FILTER
          value: $(params.EXTRA_ARTIFACT_FILTER)
        - name: IMAGE_URL
          value: $(params.image-url)
        - name: IMAGE_DIGEST
          value: $(params.image-digest)
        - name: CA_FILE
          value: /etc/pki/tls/certs/ca-custom-bundle.crt
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        if [[ "${FETCH_EXTRA_ARTIFACTS}" != "true" ]]; then
          exit 0
        fi

        if [[ -z "${IMAGE_URL}" || -z "${IMAGE_DIGEST}" ]]; then
          echo "INFO: image-url/image-digest missing, cannot fetch extra artifacts"
          exit 0
        fi

        declare -a oras_opts=()
        # shellcheck source=/dev/null
        source /usr/local/bin/oras_opts.sh

        IMAGE_REF="${IMAGE_URL}@${IMAGE_DIGEST}"
        echo "INFO: Fetching extra artifacts from OCI reference ${IMAGE_REF}"

        authfile="$(mktemp)"
        trap 'rm -f "${authfile}"' EXIT
        /usr/local/bin/select-oci-auth.sh "${IMAGE_URL}" >"${authfile}"

        retry oras manifest fetch "${oras_opts[@]}" --registry-config "${authfile}" "${IMAGE_REF}" >"/tmp/manifest.json"

        config_media_type="$(jq -r '.config.mediaType // ""' /tmp/manifest.json)"
        if [[ "${config_media_type}" == "application/vnd.oci.image.config.v1+json" ]] || [[ "${config_media_type}" == "application/vnd.docker.container.image.v1+json" ]]; then
          echo "INFO: Reference points to a container image config (${config_media_type}); skipping extra artifact fetch"
          exit 0
        fi

        mkdir -p /var/workdir/source

        fetched_count=0
        while IFS=$'\t' read -r digest rel_path; do
          [[ -n "${rel_path}" ]] || continue
          if ! printf '%s\n' "${rel_path}" | grep -Eq "${EXTRA_ARTIFACT_FILTER}"; then
            continue
          fi

          dest_path="/var/workdir/source/${rel_path}"
          resolved_dest="$(realpath -m "${dest_path}")"
          if [[ ! "${resolved_dest}" == /var/workdir/source/* ]]; then
            echo "WARN: Skipping path outside source root: ${rel_path}"
            continue
          fi

          mkdir -p "$(dirname "${resolved_dest}")"
          echo "INFO: Fetching blob ${digest} -> ${rel_path}"
          retry oras blob fetch "${oras_opts[@]}" --registry-config "${authfile}" "${IMAGE_URL}@${digest}" --output "${resolved_dest}"
          fetched_count=$((fetched_count + 1))
        done < <(jq -r '.layers[] | [.digest, (.annotations["org.opencontainers.image.title"] // "")] | @tsv' /tmp/manifest.json)

        if [[ "${fetched_count}" -eq 0 ]]; then
          echo "INFO: No files matched EXTRA_ARTIFACT_FILTER"
        else
          echo "INFO: Fetched ${fetched_count} extra artifact file(s) alongside SOURCE_ARTIFACT"
        fi
      computeResources:
        limits:
          memory: 2Gi
        requests:
          cpu: 100m
          memory: 512Mi
    - name: sast-snyk-check
      image: quay.io/konflux-ci/konflux-test:v1.5.2@sha256:c370a7bc6e172cdbab001f1a19f37ebc95f47c3d8fe2d915fa4641132490ead7
      workingDir: /var/workdir/source
      volumeMounts:
        - mountPath: /etc/secrets
          name: snyk-secret
          readOnly: true
        - mountPath: /mnt/trusted-ca
          name: trusted-ca
          readOnly: true
      env:
        - name: SNYK_SECRET
          value: $(params.SNYK_SECRET)
        - name: ARGS
          value: $(params.ARGS)
        - name: IGNORE_FILE_PATHS
          value: $(params.IGNORE_FILE_PATHS)
        - name: IMP_FINDINGS_ONLY
          value: $(params.IMP_FINDINGS_ONLY)
        - name: KFP_GIT_URL
          value: $(params.KFP_GIT_URL)
        - name: PROJECT_NAME
          value: $(params.PROJECT_NAME)
        - name: RECORD_EXCLUDED
          value: $(params.RECORD_EXCLUDED)
        - name: COMPONENT_LABEL
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['appstudio.openshift.io/component']
        - name: BUILD_PLR_LOG_URL
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['pipelinesascode.tekton.dev/log-url']
        - name: TARGET_DIRS
          value: $(params.TARGET_DIRS)
      script: |
        #!/usr/bin/env bash

        set -euo pipefail
        # shellcheck source=/dev/null
        . /utils.sh
        trap 'handle_error $(results.TEST_OUTPUT.path)' EXIT

        if [[ -z "${PROJECT_NAME}" ]]; then
          PROJECT_NAME=${COMPONENT_LABEL}
        fi

        echo "INFO: The PROJECT_NAME used is: ${PROJECT_NAME}"

        if [[ "${ARGS}" != *"--project-name"* ]]; then
          ARGS="$ARGS --project-name=${PROJECT_NAME}"
        fi

        # Installation of Red Hat certificates for cloning Red Hat internal repositories
        ca_bundle=/mnt/trusted-ca/ca-bundle.crt
        if [ -f "$ca_bundle" ]; then
          echo "INFO: Using mounted CA bundle: $ca_bundle"
          cp -vf $ca_bundle /etc/pki/ca-trust/source/anchors
          update-ca-trust
        fi

        SNYK_TOKEN_PATH="/etc/secrets/snyk_token"
        if [ -f "${SNYK_TOKEN_PATH}" ] && [ -s "${SNYK_TOKEN_PATH}" ]; then
          # SNYK token is provided
          SNYK_TOKEN="$(cat ${SNYK_TOKEN_PATH})"
          export SNYK_TOKEN
        else
          # According to shellcheck documentation, the following error can be ignored as it is ignored through indirection: https://www.shellcheck.net/wiki/SC2034
          # shellcheck disable=SC2034
          to_enable_snyk='[here](https://konflux-ci.dev/docs/testing/build/snyk/)'
          note="Task $(context.task.name) skipped: If you wish to use the Snyk code SAST task, please create a secret name snyk-secret with the key 'snyk_token' containing the Snyk token by following the steps given ${to_enable_snyk}"
          TEST_OUTPUT=$(make_result_json -r SKIPPED -t "$note")
          echo "${TEST_OUTPUT}" | tee "$(results.TEST_OUTPUT.path)"
          exit 0
        fi

        # Wrapper around snyk code test that maps valid non-zero exit codes (1, 3)
        # to 0 so the existing retry function only retries on exit code 2 (error).
        # Exit codes: 0 = success, 1 = vulnerabilities found, 2 = error, 3 = no supported files
        # The real exit code is always preserved in SNYK_EXIT_CODE.
        # Error codes (2+) always override, valid codes (0, 1, 3) only if no previous error.
        _snyk_code_test() {
          snyk code test "$@" 1>&2 >>"${WORK_DIR}/stdout.txt"
          local ec=$?
          if [[ "$ec" -ne 0 ]] && [[ "$ec" -ne 1 ]] && [[ "$ec" -ne 3 ]]; then
            SNYK_EXIT_CODE=$ec
          fi
          if [[ "$ec" -eq 1 ]] || [[ "$ec" -eq 3 ]]; then
            return 0
          fi
          return "$ec"
        }

        _empty_sarif() {
          local snyk_ver
          snyk_ver=$(snyk --version 2>/dev/null | head -1 | tr -d '\n' || echo "unknown")
          jq -n --arg version "$snyk_ver" '{
            "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
            "version": "2.1.0",
            "runs": [{
              "tool": {
                "driver": {
                  "name": "snyk",
                  "version": $version,
                  "informationUri": "https://snyk.io"
                }
              },
              "results": [],
              "properties": {
                "coverage": []
              }
            }]
          }'
        }

        SNYK_EXIT_CODE=0
        WORK_DIR="$(pwd)"
        SOURCE_CODE_DIR=/var/workdir/source

        # We ignore files using snyk ignore if the user set up the IGNORE_FILE_PATHS variable.
        (cd "${SOURCE_CODE_DIR}" && IFS="," && for path in $IGNORE_FILE_PATHS; do
          snyk ignore --file-path="${path}"
        done)

        set +e
        echo "INFO: Running 'snyk code test'.."
        # We do want to expand ARGS (it can be multiple CLI flags, not just one)
        # shellcheck disable=SC2086

        # Generate full paths for each directory in TARGET_DIRS
        IFS="," read -ra TARGETS_ARRAY <<<"$TARGET_DIRS"
        for d in "${TARGETS_ARRAY[@]}"; do
          potential_path="${SOURCE_CODE_DIR}/${d}"
          resolved_path=$(realpath -m "$potential_path")

          # Ensure resolved path is still within SOURCE_CODE_DIR
          if [[ ! "$resolved_path" == "$SOURCE_CODE_DIR"* ]]; then
            echo "Error: path traversal attempt, '$potential_path' is outside '$SOURCE_CODE_DIR'"
            exit 1
          fi

          # Ensure directory exists
          if [ ! -d "$resolved_path" ]; then
            echo "Warning: Directory $resolved_path does not exist, skipping"
            continue
          fi

          echo "INFO: Scanning directory: $resolved_path"
          # We do want to expand ARGS (it can be multiple CLI flags, not just one)
          # shellcheck disable=SC2086
          RETRY_INTERVAL=30 retry _snyk_code_test $ARGS "$resolved_path" --max-depth=1 --sarif-file-output="${resolved_path}/sast_snyk_check_out_${d//\//_}.json"

          sarif_out="${resolved_path}/sast_snyk_check_out_${d//\//_}.json"
          if [[ "$d" != "." && -f "$sarif_out" ]]; then
            prefix="${d%/}/"
            echo "INFO: Prepending path prefix '${prefix}' to ${sarif_out}"
            csgrep --mode=sarif --prepend-path-prefix="$prefix" "$sarif_out" >"${sarif_out}.tmp" && mv "${sarif_out}.tmp" "$sarif_out"
          fi

        done

        # Merge all per-target SARIF outputs into a single valid SARIF file
        shopt -s globstar nullglob
        cd "${SOURCE_CODE_DIR}" || exit 1
        sarif_files=(./**/sast_snyk_check_out_*.json)
        if [[ ${#sarif_files[@]} -gt 0 ]]; then
          csgrep --mode=sarif "${sarif_files[@]}" >"${SOURCE_CODE_DIR}/sast_snyk_check_out.json" 2>"${WORK_DIR}/csgrep_merge.err" || {
            echo "WARN: Failed to merge SARIF files with csgrep, creating empty SARIF"
            cat "${WORK_DIR}/csgrep_merge.err" >&2
            _empty_sarif >"${SOURCE_CODE_DIR}/sast_snyk_check_out.json"
          }
        else
          echo "WARN: No SARIF output files found, creating empty SARIF"
          _empty_sarif >"${SOURCE_CODE_DIR}/sast_snyk_check_out.json"
        fi
        shopt -u globstar nullglob
        cd "${WORK_DIR}" || exit 1
        set -e
        test_not_skipped=0
        SKIP_MSG="We found 0 supported files"
        grep -q "$SKIP_MSG" "${WORK_DIR}/stdout.txt" || test_not_skipped=$?

        if [[ "$SNYK_EXIT_CODE" -eq 0 ]] || [[ "$SNYK_EXIT_CODE" -eq 1 ]]; then
          # Check if the merged SARIF file has content - this could happen if the snyk scan found no findings
          if [ ! -s "${SOURCE_CODE_DIR}/sast_snyk_check_out.json" ]; then
            echo "WARN: No JSON output files were generated by snyk scan"
            _empty_sarif >"${SOURCE_CODE_DIR}/sast_snyk_check_out.json"
          fi

          # In order to generate csdiff/v1, we need to add the whole path of the source code as Snyk only provides an URI to embed the context
          (cd "${SOURCE_CODE_DIR}" && csgrep --mode=json --embed-context=3 "${SOURCE_CODE_DIR}"/sast_snyk_check_out.json) \
            >sast_snyk_check_out_all_findings.json

          echo "INFO: Initial results:"
          csgrep --mode=evtstat sast_snyk_check_out_all_findings.json

          if [[ "${KFP_GIT_URL}" == "SITE_DEFAULT" ]]; then
            KFP_GIT_URL="https://gitlab.cee.redhat.com/osh/known-false-positives.git"
          fi
          PROBE_URL="${KFP_GIT_URL%.git}" # trims '.git' suffix

          # create the KFP clone directory regardless
          KFP_DIR="known-false-positives"
          KFP_CLONED="0"
          mkdir -p "${KFP_DIR}"

          # We check if the KFP_GIT_URL variable is set to clone and apply the filters or not
          if [[ -n "${KFP_GIT_URL}" ]]; then
            # Default location only reachable from internal Konflux instances, check reachable first
            echo -n "INFO: Probing ${PROBE_URL}... "
            if curl --fail --head --max-time 60 --no-progress-meter "${PROBE_URL}" > >(head -1); then
              echo "INFO: Trying to clone known-false-positives.."
              git clone "${KFP_GIT_URL}" "${KFP_DIR}" && KFP_CLONED="1"
            fi
          fi

          if [[ "${KFP_CLONED}" -eq "0" ]]; then
            echo "WARN: Failed to clone known-false-positives at ${KFP_GIT_URL}, scan results will not be filtered"
            mv sast_snyk_check_out_all_findings.json filtered_sast_snyk_check_out.json
          else
            echo "INFO: Filtering false positives in results files using csfilter-kfp..."

            CMD=(
              csfilter-kfp
              --verbose
              --kfp-dir="${KFP_DIR}"
              --project-nvr="${PROJECT_NAME}"
            )

            if [ "${RECORD_EXCLUDED}" == "true" ]; then
              CMD+=(--record-excluded="excluded-findings.json")
            fi

            set +e
            "${CMD[@]}" sast_snyk_check_out_all_findings.json >filtered_sast_snyk_check_out.json
            status=$?
            set -e
            if [ "$status" -ne 0 ]; then
              echo "WARN: failed to filter known false positives" >&2
            else
              echo "INFO: Succeeded filtering known false positives" >&2
            fi
            echo "INFO: Results after filtering:"
            (set -x && csgrep --mode=evtstat filtered_sast_snyk_check_out.json)
          fi

          # Generation of scan stats

          total_files=$(jq '[(.runs[0].properties.coverage // [])[].files] | add' "${SOURCE_CODE_DIR}"/sast_snyk_check_out.json)
          supported_files=$(jq '[(.runs[0].properties.coverage // [])[] | select(.type == "SUPPORTED") | .files] | add' "${SOURCE_CODE_DIR}"/sast_snyk_check_out.json)

          # We make sure the values are 0 if no supported/total files are found
          if [ "$total_files" = "null" ] || [ -z "$total_files" ]; then
            total_files=0
          fi

          if [ "$supported_files" = "null" ] || [ -z "$supported_files" ]; then
            supported_files=0
          fi

          coverage_ratio=0
          if ((total_files > 0)); then
            coverage_ratio=$((supported_files * 100 / total_files))
          fi

          # embed stats in results file and convert to SARIF
          csgrep --mode=sarif --set-scan-prop snyk-scanned-files-coverage:"${coverage_ratio}" \
            --set-scan-prop snyk-scanned-files-success:"${supported_files}" \
            --set-scan-prop snyk-scanned-files-total:"${total_files}" \
            filtered_sast_snyk_check_out.json >sast_snyk_check_out.sarif

          # Create filtered SARIF for Tekton task result based on IMP_FINDINGS_ONLY parameter
          if [ "${IMP_FINDINGS_ONLY}" == "true" ]; then
            # Filter to only "error" level or higher (high/critical severity) for Tekton task result
            # In SARIF, defects are given a level like "error" or "warning". Snyk maps "high" level findings to "error".
            # - "error" → importance level 1
            # - "warning" (or missing level) → importance level 0
            RESULT_SARIF="result_sast_snyk_check_out.sarif"
            csgrep --mode=sarif --imp-level 1 sast_snyk_check_out.sarif >"$RESULT_SARIF"
          else
            # Use all findings for Tekton task result
            RESULT_SARIF="sast_snyk_check_out.sarif"
          fi

          TEST_OUTPUT=
          parse_test_output "$(context.task.name)" sarif "$RESULT_SARIF" || true

        # When the test is skipped, the "SNYK_EXIT_CODE" is 3 and it can also be 3 in some other situation
        elif [[ "$test_not_skipped" -eq 0 ]]; then
          note="Task $(context.task.name) success: Snyk code test found zero supported files."
          ERROR_OUTPUT=$(make_result_json -r SUCCESS -t "$note")
        else
          echo "sast-snyk-check test failed because of the following issues:"
          cat "${WORK_DIR}/stdout.txt"
          note="Task $(context.task.name) failed: For details, check Tekton task log."
          ERROR_OUTPUT=$(make_result_json -r ERROR -t "$note")
        fi
        echo "${TEST_OUTPUT:-${ERROR_OUTPUT}}" | tee "$(results.TEST_OUTPUT.path)"
      computeResources:
        limits:
          memory: 6Gi
        requests:
          cpu: "1"
          memory: 6Gi
    - name: upload
      image: quay.io/konflux-ci/oras:latest@sha256:18fa6c06c8a80ba272354f969e7a80c09d834c4889acc7079353080d7e979d33
      workingDir: /var/workdir/source
      volumeMounts:
        - mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
          name: trusted-ca
          readOnly: true
          subPath: ca-bundle.crt
      env:
        - name: IMAGE_URL
          value: $(params.image-url)
        - name: IMAGE_DIGEST
          value: $(params.image-digest)
      script: |
        #!/usr/bin/env bash

        if [ -z "${IMAGE_URL}" ]; then
          echo 'No image-url provided. Skipping upload.'
          exit 0
        fi

        UPLOAD_FILES="sast_snyk_check_out.sarif excluded-findings.json"
        for UPLOAD_FILE in ${UPLOAD_FILES}; do
          if [ ! -f "${UPLOAD_FILE}" ]; then
            echo "No ${UPLOAD_FILE} exists. Skipping upload."
            continue
          fi
          if [ "${UPLOAD_FILE}" == "excluded-findings.json" ]; then
            MEDIA_TYPE=application/json
          else
            MEDIA_TYPE=application/sarif+json
          fi
          echo "Selecting auth"
          select-oci-auth "${IMAGE_URL}" >"${HOME}/auth.json"
          echo "Attaching to ${IMAGE_URL}"
          if ! retry oras attach --no-tty --registry-config "$HOME/auth.json" --artifact-type "${MEDIA_TYPE}" "${IMAGE_URL}@${IMAGE_DIGEST}" "${UPLOAD_FILE}:${MEDIA_TYPE}"; then
            echo "Failed to attach to ${IMAGE_URL}"
          fi
        done
      computeResources:
        limits:
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 256Mi
