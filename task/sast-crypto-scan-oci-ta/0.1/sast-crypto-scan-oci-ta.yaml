apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: sast-crypto-scan-oci-ta
  annotations:
    tekton.dev/pipelines.minVersion: 0.12.1
    tekton.dev/tags: konflux
  labels:
    app.kubernetes.io/version: "0.1"
spec:
  description: >-
    The sast-crypto-scan-oci-ta task uses [rh-crypto-scanner-image](https://gitlab.cee.redhat.com/security-guild/crypto-scanning/rh-crypto-scanner-image) tool to perform Static Code Analysis in order to detect crypto assets being used.
    It reports crypto algorithms in a CycloneDX format (cbom.json).
  params:
    - name: CACHI2_ARTIFACT
      description: The Trusted Artifact URI pointing to the artifact with
        the prefetched dependencies.
      type: string
      default: ""
    - name: SOURCE_ARTIFACT
      description: The Trusted Artifact URI pointing to the artifact with
        the application source code.
      type: string
    - name: TARGET_DIRS
      description: Target directories in component's source code. Multiple
        values should be separated with commas.
      type: string
      default: "."
    - name: SKIP_SBOM_GENERATION
      description: Skip SBOM-related operations. This will likely cause EC policies to fail if enabled
      type: string
      default: "false"
    - name: SCAN_TIMEOUT
      description: Timeout scan if it takes more than the time specified
      type: string
      default: "30m"
    - name: caTrustConfigMapName
      description: The name of the ConfigMap to read CA bundle data from.
      type: string
      default: trusted-ca
    - name: caTrustConfigMapKey
      description: The name of the key in the ConfigMap that contains the
        CA bundle data.
      type: string
      default: ca-bundle.crt
    - name: image-url
      description: Image URL.
      type: string
      default: ""
    - name: image-digest
      description: Image digest to report findings for.
      type: string
      default: ""
  results:
    - name: TEST_OUTPUT
      description: Tekton task test output.
  volumes:
    - name: trusted-ca
      configMap:
        items:
          - key: $(params.caTrustConfigMapKey)
            path: ca-bundle.crt
        name: $(params.caTrustConfigMapName)
        optional: true
    - name: workdir
      emptyDir: {}
  stepTemplate:
    volumeMounts:
      - mountPath: /var/workdir
        name: workdir
  steps:
    - name: use-trusted-artifact
      image: quay.io/konflux-ci/build-trusted-artifacts:latest@sha256:d6d6048bdb5a73697ff88734a3f33c54193405b901d3f5192b8251a878623906
      args:
        - use
        - $(params.SOURCE_ARTIFACT)=/var/workdir/source
        - $(params.CACHI2_ARTIFACT)=/var/workdir/cachi2
      volumeMounts:
        - mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
          name: trusted-ca
          readOnly: true
          subPath: ca-bundle.crt
    - name: rh-crypto-scanner
      image:  images.paas.redhat.com/exd-sp-guild-security/rh-crypto-scanner-image@sha256:5d9e7c978e0cbada5b0e014d24b208a6adf614b11d36766ea464a93c5fc9239c
      workingDir: /var/workdir/source
      env:
        - name: TARGET_DIRS
          value: $(params.TARGET_DIRS)
        - name: SCAN_TIMEOUT
          value: $(params.SCAN_TIMEOUT)
        - name: BUILD_PLR_LOG_URL
          valueFrom:
            fieldRef:
              fieldPath: metadata.annotations['pipelinesascode.tekton.dev/log-url']
      script: |
        #!/usr/bin/env bash
        set -e

        if [ "${SKIP_SBOM_GENERATION}" = "true" ]; then
          echo "Skipping SBOM generation"
          exit 0
        fi

        echo "Using crypto-finder version:"
        crypto-finder version

        echo "Using opengrep version: $(opengrep  --version)"

        OUTPUT_FILE="cbom.json"
        SOURCE_CODE_DIR="/var/workdir/source"

        # generate full path for each dirname separated by comma
        declare -a ALL_TARGETS
        IFS="," read -ra TARGET_ARRAY <<<"$TARGET_DIRS"
        for d in "${TARGET_ARRAY[@]}"; do
          potential_path="${SOURCE_CODE_DIR}/${d}"

          resolved_path=$(realpath -m "$potential_path")

          # ensure resolved path is still within SOURCE_CODE_DIR
          if [[ "$resolved_path" == "$SOURCE_CODE_DIR"* ]]; then
            ALL_TARGETS+=("$resolved_path")
          else
            echo "Error: path traversal attempt, '$potential_path' is outside '$SOURCE_CODE_DIR'"
            exit 1
          fi
        done

        echo "Running crypto scanner on the specified targets"
        crypto-finder \
          scan \
          --no-remote-rules \
          --rules-dir /usr/local/rules/crypto-rules \
          --rules-dir /usr/local/rules/rh-crypto-rules \
          --format cyclonedx \
          --timeout ${SCAN_TIMEOUT} \
          ${ALL_TARGETS[@]} > ${OUTPUT_FILE}

        TEST_OUTPUT=$(echo "{\"result\":\"SUCCESS\",\"timestamp\":\"$(date -u --iso-8601=seconds)\",\"failures\":0,\"successes\":1,\"warnings\":0}")
        echo "${TEST_OUTPUT}" | tee "$(results.TEST_OUTPUT.path)"
        echo "Task $(context.task.name) completed successfully."
      computeResources:
        limits:
          cpu: "8"
          memory: 4Gi
        requests:
          cpu: "1"
          memory: 4Gi
    - name: upload
      image: quay.io/konflux-ci/oras:latest@sha256:da693a7dcbadafc9f4422ae6600b41b2847944f7f14c5622827d6f58c727cf08
      workingDir: /var/workdir/source
      volumeMounts:
        - mountPath: /etc/pki/tls/certs/ca-custom-bundle.crt
          name: trusted-ca
          readOnly: true
          subPath: ca-bundle.crt
      env:
        - name: IMAGE_URL
          value: $(params.image-url)
        - name: IMAGE_DIGEST
          value: $(params.image-digest)
      script: |
        #!/usr/bin/env bash
        set -e

        if [ -z "${IMAGE_URL}" ] || [ -z "${IMAGE_DIGEST}" ]; then
          echo 'No image-url or image-digest param provided. Skipping upload.'
          exit 0
        fi

        UPLOAD_FILES="cbom.json"
        for UPLOAD_FILE in ${UPLOAD_FILES}; do
          if [ ! -f "${UPLOAD_FILE}" ]; then
            echo "No ${UPLOAD_FILE} exists. Skipping upload."
            continue
          fi

          # Determine the media type based on the file extension
          if [[ "${UPLOAD_FILE}" == *.json ]]; then
            MEDIA_TYPE="application/json"
          else
            MEDIA_TYPE="application/sarif+json"
          fi

          echo "Selecting auth"
          select-oci-auth "$IMAGE_URL" >"$HOME/auth.json"
          echo "Attaching to ${IMAGE_URL}"
          if ! retry oras attach --no-tty --registry-config "$HOME/auth.json" --artifact-type "${MEDIA_TYPE}" "${IMAGE_URL}@${IMAGE_DIGEST}" "${UPLOAD_FILE}:${MEDIA_TYPE}"; then
            echo "Failed to attach ${UPLOAD_FILE} to ${IMAGE_URL}"
            exit 1
          fi
        done
      computeResources:
        limits:
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 256Mi
