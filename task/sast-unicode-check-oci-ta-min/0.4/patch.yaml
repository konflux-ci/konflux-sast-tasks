- op: replace
  path: /metadata/name
  value: sast-unicode-check-oci-ta-min
# kustomize build task/sast-unicode-check-oci-ta/0.4 | yq '.spec.steps.[].name' | nl -v 0 
#     0	use-trusted-artifact
#     1	sast-unicode-check
#     2	upload

# use-trusted-artifact step
- op: test
  path: /spec/steps/0/name
  value: use-trusted-artifact
- op: remove
  path: /spec/steps/0/computeResources

# sast-unicode-check step
- op: test
  path: /spec/steps/1/name
  value: sast-unicode-check
- op: replace
  path: /spec/steps/1/computeResources/limits/memory
  value: 256Mi
- op: replace
  path: /spec/steps/1/computeResources/requests/memory
  value: 256Mi
- op: replace
  path: /spec/steps/1/computeResources/requests/cpu
  value: 128m
