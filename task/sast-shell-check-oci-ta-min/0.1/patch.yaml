- op: replace
  path: /metadata/name
  value: sast-shell-check-oci-ta-min
# kustomize build task/sast-shell-check-oci-ta/0.1 | yq '.spec.steps.[].name' | nl -v 0 
#     0	use-trusted-artifact
#     1	sast-shell-check
#     2	upload

# sast-shell-check step
- op: test
  path: /spec/steps/1/name
  value: sast-shell-check
- op: replace
  path: /spec/steps/1/computeResources/limits/memory
  value: 256Mi
- op: replace
  path: /spec/steps/1/computeResources/requests/memory
  value: 256Mi
- op: replace
  path: /spec/steps/1/computeResources/limits/cpu
  value: 128m
- op: replace
  path: /spec/steps/1/computeResources/requests/cpu
  value: 128m
