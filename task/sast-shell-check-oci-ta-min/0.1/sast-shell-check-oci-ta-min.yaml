        if [ ! -f "${UPLOAD_FILE}" ]; then
          echo "No ${UPLOAD_FILE} exists. Skipping upload."
          continue
        fi

        # Determine the media type based on the file extension
        if [[ "${UPLOAD_FILE}" == *.json ]]; then
          MEDIA_TYPE="application/json"
